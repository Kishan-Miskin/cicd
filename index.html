<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Arts – Art Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #080809;
            --surface: #111114;
            --card: #0f0f12;
            --border: #1e1e24;
            --border-hover: #7b2cbf;
            --text: #e8e4dc;
            --muted: #6a6a78;
            --accent: #7b2cbf;
            --accent2: #c77dff;
            --gold: #c9a96e;
            --red: #e63946;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        /* ---- HEADER ---- */
        .header {
            position: fixed;
            top: 0; width: 100%;
            background: rgba(8,8,9,0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            padding: 0 2rem;
            height: 68px;
            display: flex; align-items: center;
        }

        .navbar {
            max-width: 1400px;
            margin: auto;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--accent2);
        }
        .logo span { color: var(--gold); font-style: italic; }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: color 0.3s;
        }
        .nav-links a:hover { color: var(--accent2); }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
        }
        .hamburger span {
            width: 26px; height: 2px;
            background: var(--muted);
            border-radius: 2px;
            transition: 0.3s;
        }

        /* ---- MAIN ---- */
        .main {
            padding-top: 68px;
            max-width: 1400px;
            margin: 0 auto;
            padding-left: 1.5rem;
            padding-right: 1.5rem;
        }

        /* ---- HERO ---- */
        .hero {
            text-align: center;
            padding: 5rem 1rem 3.5rem;
            position: relative;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 600px; height: 300px;
            background: radial-gradient(ellipse, rgba(123,44,191,0.12) 0%, transparent 70%);
            pointer-events: none;
        }

        .hero-eyebrow {
            display: inline-block;
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--gold);
            border: 1px solid rgba(201,169,110,0.3);
            padding: 0.4rem 1.2rem;
            border-radius: 20px;
            margin-bottom: 1.5rem;
        }

        .hero h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.4rem, 6vw, 4rem);
            font-weight: 300;
            line-height: 1.15;
            color: var(--text);
            margin-bottom: 1rem;
        }
        .hero h1 em { color: var(--accent2); font-style: italic; }

        .hero p {
            color: var(--muted);
            max-width: 560px;
            margin: 0 auto 2.5rem;
            font-size: 0.95rem;
            line-height: 1.8;
        }

        /* ---- SEARCH ---- */
        .search-wrap {
            max-width: 520px;
            margin: 0 auto 1rem;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 0.95rem 1rem 0.95rem 3rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 0.9rem;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.3s;
        }
        .search-input::placeholder { color: var(--muted); }
        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(123,44,191,0.15);
        }

        .search-icon {
            position: absolute;
            left: 1rem; top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 0.85rem;
        }

        .search-count {
            text-align: center;
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 0.5rem;
            min-height: 1.2em;
        }

        /* ---- FILTERS ---- */
        .filters {
            display: flex;
            gap: 0.7rem;
            margin: 2rem 0;
            overflow-x: auto;
            padding-bottom: 0.5rem;
        }
        .filters::-webkit-scrollbar { height: 3px; }
        .filters::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }

        .filter-btn {
            padding: 0.55rem 1.3rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.82rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.25s;
        }
        .filter-btn:hover { border-color: var(--accent); color: var(--accent2); }
        .filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        /* ---- GALLERY GRID ---- */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            padding-bottom: 5rem;
        }

        /* ---- CARD ---- */
        .art-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.3s;
            display: flex;
            flex-direction: column;
        }

        .art-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(123,44,191,0.4);
            border-color: var(--border-hover);
        }

        /* ---- IMAGE AREA — fixed square, uniform display ---- */
        .img-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 3;
            background: #0a0a0d;
            overflow: hidden;
            flex-shrink: 0;
        }

        .art-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;        /* fills the box, crops edges */
            object-position: center top;
            display: block;
            transition: transform 0.5s ease;
        }

        .art-card:hover .art-img { transform: scale(1.04); }

        /* dark gradient for readability */
        .img-wrap::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 50%;
            background: linear-gradient(transparent, rgba(8,8,9,0.7));
            pointer-events: none;
        }

        .wishlist-btn {
            position: absolute;
            top: 0.75rem; right: 0.75rem;
            width: 36px; height: 36px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(10,10,15,0.8);
            backdrop-filter: blur(8px);
            color: var(--muted);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.25s;
            z-index: 5;
            font-size: 0.85rem;
        }
        .wishlist-btn:hover { color: var(--red); border-color: var(--red); }
        .wishlist-btn.active { color: var(--red); background: rgba(230,57,70,0.2); border-color: var(--red); }

        .category-badge {
            position: absolute;
            bottom: 0.75rem; left: 0.75rem;
            font-size: 0.68rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: rgba(123,44,191,0.75);
            backdrop-filter: blur(6px);
            color: #ddb8ff;
            padding: 0.25rem 0.7rem;
            border-radius: 6px;
            z-index: 5;
        }

        /* ---- CARD BODY ---- */
        .card-body {
            padding: 1.1rem 1.2rem 0.8rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--text);
            line-height: 1.3;
            margin-bottom: 0.2rem;
        }

        .card-artist {
            font-size: 0.82rem;
            color: var(--gold);
            letter-spacing: 0.5px;
            margin-bottom: 0.7rem;
        }

        .card-desc {
            font-size: 0.82rem;
            color: var(--muted);
            line-height: 1.65;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex: 1;
        }

        .card-meta {
            display: flex;
            gap: 1rem;
            margin-top: 0.9rem;
            padding-top: 0.9rem;
            border-top: 1px solid var(--border);
        }

        .meta-item {
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
        }
        .meta-label {
            font-size: 0.68rem;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: var(--muted);
        }
        .meta-value {
            font-size: 0.8rem;
            color: var(--text);
            font-weight: 500;
        }

        .card-footer {
            padding: 0 1.2rem 1.2rem;
        }
        .view-btn {
            width: 100%;
            padding: 0.7rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--accent2);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.82rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.25s;
        }
        .view-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        /* ---- EMPTY STATE ---- */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 5rem 2rem;
        }
        .empty-state i {
            font-size: 3rem;
            color: var(--border);
            margin-bottom: 1rem;
            display: block;
        }
        .empty-state p { color: var(--muted); font-size: 0.95rem; }

        /* ---- MODAL ---- */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.88);
            z-index: 2000;
            overflow-y: auto;
            padding: 2rem 1rem;
            backdrop-filter: blur(8px);
        }
        .modal.open { display: flex; align-items: center; justify-content: center; }

        .modal-inner {
            background: #0e0e12;
            border: 1px solid #2a2a34;
            border-radius: 20px;
            max-width: 1050px;
            width: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            margin: auto;
            box-shadow: 0 40px 80px rgba(0,0,0,0.7);
        }

        .modal-close {
            position: absolute;
            top: 1rem; right: 1rem;
            width: 38px; height: 38px;
            border-radius: 50%;
            background: rgba(20,20,26,0.9);
            border: 1px solid #333;
            color: var(--muted);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            z-index: 10;
            transition: all 0.3s;
            font-size: 0.85rem;
        }
        .modal-close:hover { background: var(--accent); color: white; transform: rotate(90deg); }

        .modal-img-wrap {
            width: 100%;
            height: 320px;
            background: #050507;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .modal-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 1.5rem;
        }

        .modal-body { padding: 2rem; }
        .modal-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            font-weight: 600;
            color: var(--accent2);
            margin-bottom: 0.3rem;
        }
        .modal-artist { color: var(--gold); font-size: 1rem; margin-bottom: 1rem; }
        .modal-desc { color: var(--muted); font-size: 0.92rem; line-height: 1.8; margin-bottom: 1.5rem; }

        .detail-grid {
            background: #14141a;
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1.2rem;
            border-bottom: 1px solid var(--border);
            gap: 1rem;
        }
        .detail-row:last-child { border-bottom: none; }
        .detail-row-label { font-size: 0.82rem; color: var(--muted); white-space: nowrap; }
        .detail-row-val { font-size: 0.88rem; color: var(--text); font-weight: 500; text-align: right; }

        /* ---- RESPONSIVE ---- */
        @media (max-width: 640px) {
            .nav-links { display: none; }
            .hamburger { display: flex; }
            .nav-links.open {
                display: flex;
                flex-direction: column;
                position: absolute;
                top: 68px; left: 0; right: 0;
                background: rgba(8,8,9,0.97);
                border-bottom: 1px solid var(--border);
                padding: 1.5rem 2rem;
                gap: 1.2rem;
            }
            .hero h1 { font-size: 2rem; }
        }

        @media (min-width: 800px) {
            .modal-inner { flex-direction: row; }
            .modal-img-wrap { width: 45%; height: auto; min-height: 520px; }
            .modal-body { width: 55%; overflow-y: auto; max-height: 80vh; }
        }
    </style>
</head>
<body>

<header class="header">
    <nav class="navbar">
        <div class="logo">Nova <span>Arts</span></div>
        <ul class="nav-links" id="navLinks">
            <li><a href="#">Explore</a></li>
            <li><a href="#">Collections</a></li>
            <li><a href="#">Artists</a></li>
            <li><a href="#">About</a></li>
        </ul>
        <div class="hamburger" id="hamburger">
            <span></span><span></span><span></span>
        </div>
    </nav>
</header>

<main class="main">
    <section class="hero">
        <span class="hero-eyebrow">Curated Masterworks</span>
        <h1>Discover the World's<br><em>Greatest Art</em></h1>
        <p>Journey through centuries of artistic brilliance — from Renaissance frescoes to Modern expressions.</p>
        <div class="search-wrap">
            <i class="fas fa-search search-icon"></i>
            <input class="search-input" id="searchBar" type="text"
                   placeholder="Search by title, artist, style, or period…">
        </div>
        <div class="search-count" id="searchCount"></div>
    </section>

    <div class="filters" id="filters">
        <button class="filter-btn active" data-cat="all">All Works</button>
        <button class="filter-btn" data-cat="renaissance">Renaissance</button>
        <button class="filter-btn" data-cat="baroque">Baroque</button>
        <button class="filter-btn" data-cat="romanticism">Romanticism</button>
        <button class="filter-btn" data-cat="impressionism">Impressionism</button>
        <button class="filter-btn" data-cat="modern">Modern</button>
        <button class="filter-btn" data-cat="postimpressionism">Post-Impressionism</button>
    </div>

    <div class="gallery" id="gallery"></div>
</main>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-inner">
        <button class="modal-close" id="modalClose"><i class="fas fa-times"></i></button>
        <div class="modal-img-wrap">
            <img class="modal-img" id="mImg" alt="">
        </div>
        <div class="modal-body">
            <h2 class="modal-title" id="mTitle"></h2>
            <p class="modal-artist" id="mArtist"></p>
            <p class="modal-desc" id="mDesc"></p>
            <div class="detail-grid">
                <div class="detail-row">
                    <span class="detail-row-label"><i class="fas fa-calendar"></i> &nbsp;Date</span>
                    <span class="detail-row-val" id="mDate"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-row-label"><i class="fas fa-palette"></i> &nbsp;Medium</span>
                    <span class="detail-row-val" id="mMedium"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-row-label"><i class="fas fa-ruler-combined"></i> &nbsp;Dimensions</span>
                    <span class="detail-row-val" id="mDim"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-row-label"><i class="fas fa-map-marker-alt"></i> &nbsp;Location</span>
                    <span class="detail-row-val" id="mLoc"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-row-label"><i class="fas fa-tag"></i> &nbsp;Style</span>
                    <span class="detail-row-val" id="mStyle"></span>
                </div>
            </div>
        </div>
    </div>
</div>

let activeFilter = "all";
let wishlist = new Set();
let query = "";

const gallery = document.getElementById("gallery");
const modal = document.getElementById("modal");
const searchBar = document.getElementById("searchBar");
const searchCount = document.getElementById("searchCount");

function render() {
    let list = ARTWORKS;
    if (activeFilter !== "all") list = list.filter(a => a.cat === activeFilter);
    if (query) {
        const q = query.toLowerCase();
        list = list.filter(a =>
            a.title.toLowerCase().includes(q) ||
            a.artist.toLowerCase().includes(q) ||
            a.style.toLowerCase().includes(q) ||
            a.cat.toLowerCase().includes(q) ||
            a.date.includes(q) ||
            a.loc.toLowerCase().includes(q)
        );
    }

    searchCount.textContent = list.length
        ? `Showing ${list.length} artwork${list.length !== 1 ? "s" : ""}`
        : "";

    if (!list.length) {
        gallery.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-search"></i>
            <p>No artworks found for "<strong>${query || activeFilter}</strong>".</p>
          </div>`;
        return;
    }

    gallery.innerHTML = list.map(a => `
      <article class="art-card">
        <div class="img-wrap">
          <img class="art-img" src="${a.img}" alt="${a.title}" loading="lazy">
          <button class="wishlist-btn ${wishlist.has(a.id) ? "active" : ""}"
                  onclick="toggleWish(event,${a.id})" title="Wishlist">
            <i class="fas fa-heart"></i>
          </button>
          <span class="category-badge">${a.style.split('/')[0].trim()}</span>
        </div>
        <div class="card-body">
          <h3 class="card-title">${a.title}</h3>
          <p class="card-artist">${a.artist} · ${a.date}</p>
          <p class="card-desc">${a.desc}</p>
          <div class="card-meta">
            <div class="meta-item">
              <span class="meta-label">Medium</span>
              <span class="meta-value">${a.medium.split(' ').slice(0,2).join(' ')}</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Location</span>
              <span class="meta-value">${a.loc.split(',')[0]}</span>
            </div>
          </div>
        </div>
        <div class="card-footer">
          <button class="view-btn" onclick="openModal(${a.id})">
            <i class="fas fa-expand-alt"></i> &nbsp;View Details
          </button>
        </div>
      </article>
    `).join("");
}

function toggleWish(e, id) {
    e.stopPropagation();
    wishlist.has(id) ? wishlist.delete(id) : wishlist.add(id);
    render();
}

function openModal(id) {
    const a = ARTWORKS.find(x => x.id === id);
    document.getElementById("mImg").src = a.img;
    document.getElementById("mImg").alt = a.title;
    document.getElementById("mTitle").textContent = a.title;
    document.getElementById("mArtist").textContent = `${a.artist}`;
    document.getElementById("mDesc").textContent = a.desc;
    document.getElementById("mDate").textContent = a.date;
    document.getElementById("mMedium").textContent = a.medium;
    document.getElementById("mDim").textContent = a.dim;
    document.getElementById("mLoc").textContent = a.loc;
    document.getElementById("mStyle").textContent = a.style;
    modal.classList.add("open");
    document.body.style.overflow = "hidden";
}

function closeModal() {
    modal.classList.remove("open");
    document.body.style.overflow = "";
}

// FILTERS
document.getElementById("filters").addEventListener("click", e => {
    const btn = e.target.closest(".filter-btn");
    if (!btn) return;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = btn.dataset.cat;
    render();
});

// SEARCH
searchBar.addEventListener("input", e => {
    query = e.target.value.trim();
    render();
});

// MODAL CLOSE
document.getElementById("modalClose").onclick = closeModal;
modal.addEventListener("click", e => { if (e.target === modal) closeModal(); });
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

// HAMBURGER
document.getElementById("hamburger").onclick = () => {
    document.getElementById("navLinks").classList.toggle("open");
};

render();
</script>
