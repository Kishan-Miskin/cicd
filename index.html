<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Arts – Art Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #080809;
            --surface: #111114;
            --card: #0f0f12;
            --border: #1e1e24;
            --border-hover: #7b2cbf;
            --text: #e8e4dc;
            --muted: #6a6a78;
            --accent: #7b2cbf;
            --accent2: #c77dff;
            --gold: #c9a96e;
            --red: #e63946;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        /* ── HEADER ── */
        .header {
            position: fixed;
            top: 0; width: 100%;
            background: rgba(8,8,9,0.95);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            height: 68px;
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
        }
        .navbar {
            max-width: 1400px;
            margin: auto;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--accent2);
            flex-shrink: 0;
        }
        .logo span { color: var(--gold); font-style: italic; }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }
        .nav-links a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.82rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: color 0.3s;
            white-space: nowrap;
        }
        .nav-links a:hover { color: var(--accent2); }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 4px;
        }
        .hamburger span {
            width: 24px; height: 2px;
            background: var(--muted);
            border-radius: 2px;
            transition: 0.3s;
        }

        /* ── MAIN ── */
        .main {
            padding-top: 68px;
            max-width: 1400px;
            margin: 0 auto;
            padding-left: 1.25rem;
            padding-right: 1.25rem;
        }

        /* ── HERO ── */
        .hero {
            text-align: center;
            padding: 4.5rem 1rem 3rem;
            position: relative;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: min(600px, 100%);
            height: 280px;
            background: radial-gradient(ellipse, rgba(123,44,191,0.13) 0%, transparent 70%);
            pointer-events: none;
        }
        .hero-eyebrow {
            display: inline-block;
            font-size: 0.72rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--gold);
            border: 1px solid rgba(201,169,110,0.35);
            padding: 0.4rem 1.2rem;
            border-radius: 20px;
            margin-bottom: 1.4rem;
        }
        .hero h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2rem, 5.5vw, 3.8rem);
            font-weight: 300;
            line-height: 1.15;
            margin-bottom: 1rem;
        }
        .hero h1 em { color: var(--accent2); font-style: italic; }
        .hero p {
            color: var(--muted);
            max-width: 540px;
            margin: 0 auto 2.5rem;
            font-size: clamp(0.88rem, 2vw, 0.98rem);
            line-height: 1.8;
        }

        /* ── SEARCH ── */
        .search-wrap {
            max-width: 500px;
            margin: 0 auto 0.6rem;
            position: relative;
        }
        .search-input {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 2.9rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 0.9rem;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.3s;
        }
        .search-input::placeholder { color: var(--muted); }
        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(123,44,191,0.15);
        }
        .search-icon {
            position: absolute;
            left: 1rem; top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 0.82rem;
            pointer-events: none;
        }
        .search-count {
            text-align: center;
            font-size: 0.78rem;
            color: var(--muted);
            min-height: 1.2em;
            margin-bottom: 0.4rem;
        }

        /* ── FILTERS ── */
        .filters {
            display: flex;
            gap: 0.6rem;
            margin: 1.6rem 0;
            overflow-x: auto;
            padding-bottom: 0.5rem;
            -webkit-overflow-scrolling: touch;
        }
        .filters::-webkit-scrollbar { height: 3px; }
        .filters::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }
        .filter-btn {
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 0.4px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.22s;
            flex-shrink: 0;
        }
        .filter-btn:hover { border-color: var(--accent); color: var(--accent2); }
        .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

        /* ── GALLERY GRID ── */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.4rem;
            padding-bottom: 5rem;
        }

        /* ── CARD ── */
        .art-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            cursor: pointer;                          /* ← whole card is clickable */
            transition: transform 0.32s ease, box-shadow 0.32s ease, border-color 0.25s;
        }
        .art-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 18px 40px rgba(0,0,0,0.55), 0 0 0 1px rgba(123,44,191,0.4);
            border-color: var(--border-hover);
        }

        /* ── IMAGE AREA ── */
        .img-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 3;
            background: #0a0a0d;
            overflow: hidden;
            flex-shrink: 0;
        }
        .art-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            display: block;
            transition: transform 0.5s ease;
        }
        /* Fallback gradient shown while image loads */
        .img-wrap::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #16161e 0%, #0e0e15 100%);
            z-index: 0;
        }
        .art-img { z-index: 1; }
        .art-card:hover .art-img { transform: scale(1.05); }

        /* bottom gradient */
        .img-wrap::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 55%;
            background: linear-gradient(transparent, rgba(8,8,9,0.72));
            pointer-events: none;
            z-index: 2;
        }

        /* hover overlay "View Details" */
        .card-overlay {
            position: absolute;
            inset: 0;
            background: rgba(8,8,9,0.55);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 6;
            backdrop-filter: blur(2px);
        }
        .art-card:hover .card-overlay { opacity: 1; }
        .overlay-label {
            background: rgba(123,44,191,0.85);
            color: white;
            padding: 0.6rem 1.4rem;
            border-radius: 30px;
            font-size: 0.82rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid rgba(199,125,255,0.5);
        }

        .wishlist-btn {
            position: absolute;
            top: 0.7rem; right: 0.7rem;
            width: 34px; height: 34px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(10,10,15,0.82);
            backdrop-filter: blur(8px);
            color: var(--muted);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.22s;
            z-index: 10;
            font-size: 0.8rem;
        }
        .wishlist-btn:hover { color: var(--red); border-color: var(--red); }
        .wishlist-btn.active { color: var(--red); background: rgba(230,57,70,0.2); border-color: var(--red); }

        .category-badge {
            position: absolute;
            bottom: 0.7rem; left: 0.7rem;
            font-size: 0.65rem;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            background: rgba(123,44,191,0.8);
            backdrop-filter: blur(6px);
            color: #ddb8ff;
            padding: 0.22rem 0.65rem;
            border-radius: 5px;
            z-index: 5;
        }

        /* ── CARD BODY ── */
        .card-body {
            padding: 1rem 1.1rem 0.75rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .card-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text);
            line-height: 1.3;
            margin-bottom: 0.2rem;
        }
        .card-artist {
            font-size: 0.78rem;
            color: var(--gold);
            letter-spacing: 0.4px;
            margin-bottom: 0.6rem;
        }
        .card-desc {
            font-size: 0.8rem;
            color: var(--muted);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex: 1;
        }
        .card-meta {
            display: flex;
            gap: 1rem;
            margin-top: 0.8rem;
            padding-top: 0.8rem;
            border-top: 1px solid var(--border);
        }
        .meta-item { display: flex; flex-direction: column; gap: 0.12rem; }
        .meta-label {
            font-size: 0.65rem;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: var(--muted);
        }
        .meta-value { font-size: 0.78rem; color: var(--text); font-weight: 500; }

        .card-footer { padding: 0 1.1rem 1.1rem; }
        .view-btn {
            width: 100%;
            padding: 0.65rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--accent2);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.22s;
        }
        .view-btn:hover { background: var(--accent); border-color: var(--accent); color: white; }

        /* ── EMPTY STATE ── */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 5rem 2rem;
        }
        .empty-state i { font-size: 2.5rem; color: var(--border); margin-bottom: 1rem; display: block; }
        .empty-state p { color: var(--muted); font-size: 0.92rem; }

        /* ── MODAL ── */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            overflow-y: auto;
            padding: 1.5rem 1rem;
            backdrop-filter: blur(10px);
        }
        .modal.open { display: flex; align-items: flex-start; justify-content: center; }

        .modal-inner {
            background: #0e0e12;
            border: 1px solid #2a2a34;
            border-radius: 18px;
            max-width: 1050px;
            width: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            margin: auto;
            box-shadow: 0 40px 80px rgba(0,0,0,0.75);
            animation: modalIn 0.28s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: translateY(18px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .modal-close {
            position: absolute;
            top: 0.9rem; right: 0.9rem;
            width: 36px; height: 36px;
            border-radius: 50%;
            background: rgba(20,20,26,0.92);
            border: 1px solid #333;
            color: var(--muted);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            z-index: 10;
            transition: all 0.3s;
            font-size: 0.82rem;
        }
        .modal-close:hover { background: var(--accent); color: white; transform: rotate(90deg); }

        .modal-img-wrap {
            width: 100%;
            background: #050507;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            min-height: 280px;
        }
        .modal-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 1.5rem;
            max-height: 420px;
        }

        .modal-body { padding: 1.8rem; }
        .modal-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.5rem, 4vw, 2rem);
            font-weight: 600;
            color: var(--accent2);
            margin-bottom: 0.3rem;
        }
        .modal-artist { color: var(--gold); font-size: 0.95rem; margin-bottom: 1rem; }
        .modal-desc { color: var(--muted); font-size: 0.9rem; line-height: 1.8; margin-bottom: 1.5rem; }

        .detail-grid {
            background: #14141a;
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.7rem 1.1rem;
            border-bottom: 1px solid var(--border);
            gap: 1rem;
        }
        .detail-row:last-child { border-bottom: none; }
        .detail-row-label { font-size: 0.8rem; color: var(--muted); white-space: nowrap; }
        .detail-row-val { font-size: 0.85rem; color: var(--text); font-weight: 500; text-align: right; }

        /* ── RESPONSIVE ── */

        /* Mobile nav */
        @media (max-width: 640px) {
            .nav-links { display: none; }
            .hamburger { display: flex; }
            .nav-links.open {
                display: flex;
                flex-direction: column;
                position: fixed;
                top: 68px; left: 0; right: 0;
                background: rgba(8,8,9,0.98);
                border-bottom: 1px solid var(--border);
                padding: 1.5rem 2rem;
                gap: 1.2rem;
                z-index: 999;
            }
        }

        /* Single column on very small screens */
        @media (max-width: 420px) {
            .gallery { grid-template-columns: 1fr; }
        }

        /* 2 columns on small-medium */
        @media (min-width: 421px) and (max-width: 720px) {
            .gallery { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
        }

        /* 3 columns on medium */
        @media (min-width: 721px) and (max-width: 1100px) {
            .gallery { grid-template-columns: repeat(3, 1fr); }
        }

        /* 4 columns on large */
        @media (min-width: 1101px) {
            .gallery { grid-template-columns: repeat(4, 1fr); }
        }

        /* Modal side-by-side on tablet+ */
        @media (min-width: 768px) {
            .modal-inner { flex-direction: row; }
            .modal-img-wrap { width: 44%; min-height: 500px; }
            .modal-img { max-height: 100%; }
            .modal-body { width: 56%; overflow-y: auto; max-height: 85vh; }
        }

        /* Tighter padding on small screens */
        @media (max-width: 480px) {
            .main { padding-left: 0.85rem; padding-right: 0.85rem; }
            .hero { padding: 3.5rem 0.5rem 2.5rem; }
            .card-body { padding: 0.85rem 0.9rem 0.6rem; }
            .card-footer { padding: 0 0.9rem 0.9rem; }
            .modal-body { padding: 1.2rem; }
        }
    </style>
</head>
<body>

<header class="header">
    <nav class="navbar">
        <div class="logo">Nova <span>Arts</span></div>
        <ul class="nav-links" id="navLinks">
            <li><a href="#">Explore</a></li>
            <li><a href="#">Collections</a></li>
            <li><a href="#">Artists</a></li>
            <li><a href="#">About</a></li>
        </ul>
        <div class="hamburger" id="hamburger">
            <span></span><span></span><span></span>
        </div>
    </nav>
</header>

<main class="main">
    <section class="hero">
        <span class="hero-eyebrow">Curated Masterworks</span>
        <h1>Discover the World's<br><em>Greatest Art</em></h1>
        <p>Journey through centuries of artistic brilliance — from Renaissance frescoes to Modern expressions.</p>
        <div class="search-wrap">
            <i class="fas fa-search search-icon"></i>
            <input class="search-input" id="searchBar" type="text"
                   placeholder="Search by title, artist, style, or period…">
        </div>
        <div class="search-count" id="searchCount"></div>
    </section>

    <div class="filters" id="filters">
        <button class="filter-btn active" data-cat="all">All Works</button>
        <button class="filter-btn" data-cat="renaissance">Renaissance</button>
        <button class="filter-btn" data-cat="baroque">Baroque</button>
        <button class="filter-btn" data-cat="romanticism">Romanticism</button>
        <button class="filter-btn" data-cat="impressionism">Impressionism</button>
        <button class="filter-btn" data-cat="modern">Modern</button>
        <button class="filter-btn" data-cat="postimpressionism">Post-Impressionism</button>
    </div>

    <div class="gallery" id="gallery"></div>
</main>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-inner">
        <button class="modal-close" id="modalClose"><i class="fas fa-times"></i></button>
        <div class="modal-img-wrap">
            <img class="modal-img" id="mImg" alt="">
        </div>
        <div class="modal-body">
            <h2 class="modal-title" id="mTitle"></h2>
            <p class="modal-artist" id="mArtist"></p>
            <p class="modal-desc" id="mDesc"></p>
            <div class="detail-grid">
                <div class="detail-row">
                    <span class="detail-row-label"><i class="fas fa-calendar"></i>&nbsp; Date</span>
                    <span class="detail-row-val" id="mDate"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-row-label"><i class="fas fa-palette"></i>&nbsp; Medium</span>
                    <span class="detail-row-val" id="mMedium"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-row-label"><i class="fas fa-ruler-combined"></i>&nbsp; Dimensions</span>
                    <span class="detail-row-val" id="mDim"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-row-label"><i class="fas fa-map-marker-alt"></i>&nbsp; Location</span>
                    <span class="detail-row-val" id="mLoc"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-row-label"><i class="fas fa-tag"></i>&nbsp; Style</span>
                    <span class="detail-row-val" id="mStyle"></span>
                </div>
            </div>
        </div>
    </div>
</div>

let activeFilter = "all";
let wishlist = new Set();
let query = "";

const gallery  = document.getElementById("gallery");
const modal    = document.getElementById("modal");
const searchBar= document.getElementById("searchBar");
const searchCount = document.getElementById("searchCount");

/* ── RENDER ── */
function render() {
    let list = ARTWORKS;
    if (activeFilter !== "all") list = list.filter(a => a.cat === activeFilter);
    if (query) {
        const q = query.toLowerCase();
        list = list.filter(a =>
            a.title.toLowerCase().includes(q) ||
            a.artist.toLowerCase().includes(q) ||
            a.style.toLowerCase().includes(q) ||
            a.cat.toLowerCase().includes(q) ||
            a.date.includes(q) ||
            a.loc.toLowerCase().includes(q)
        );
    }

    searchCount.textContent = list.length
        ? `Showing ${list.length} artwork${list.length !== 1 ? "s" : ""}`
        : "";

    if (!list.length) {
        gallery.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-search"></i>
            <p>No artworks found for "<strong>${query || activeFilter}</strong>".</p>
          </div>`;
        return;
    }

    gallery.innerHTML = list.map(a => `
      <article class="art-card" onclick="openModal(${a.id})">
        <div class="img-wrap">
          <img class="art-img"
               src="${a.img}"
               alt="${a.title}"
               loading="lazy"
               onerror="this.src='https://via.placeholder.com/600x450/0f0f12/6a6a78?text=Image+Unavailable'">
          <div class="card-overlay">
            <span class="overlay-label"><i class="fas fa-expand-alt"></i> View Details</span>
          </div>
          <button class="wishlist-btn ${wishlist.has(a.id) ? "active" : ""}"
                  onclick="toggleWish(event,${a.id})" title="Add to wishlist">
            <i class="fas fa-heart"></i>
          </button>
          <span class="category-badge">${a.style.split('/')[0].trim()}</span>
        </div>
        <div class="card-body">
          <h3 class="card-title">${a.title}</h3>
          <p class="card-artist">${a.artist} · ${a.date}</p>
          <p class="card-desc">${a.desc}</p>
          <div class="card-meta">
            <div class="meta-item">
              <span class="meta-label">Medium</span>
              <span class="meta-value">${a.medium.split(' ').slice(0,2).join(' ')}</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Location</span>
              <span class="meta-value">${a.loc.split(',')[0]}</span>
            </div>
          </div>
        </div>
        <div class="card-footer">
          <button class="view-btn" onclick="openModal(${a.id})">
            <i class="fas fa-expand-alt"></i>&nbsp; View Details
          </button>
        </div>
      </article>
    `).join("");
}

/* ── WISHLIST ── */
function toggleWish(e, id) {
    e.stopPropagation();
    wishlist.has(id) ? wishlist.delete(id) : wishlist.add(id);
    // only update the specific button, no full re-render
    const btn = document.querySelector(`.wishlist-btn[onclick="toggleWish(event,${id})"]`);
    if (btn) btn.classList.toggle("active", wishlist.has(id));
}

/* ── MODAL ── */
function openModal(id) {
    const a = ARTWORKS.find(x => x.id === id);
    if (!a) return;
    document.getElementById("mImg").src    = a.img;
    document.getElementById("mImg").alt    = a.title;
    document.getElementById("mTitle").textContent  = a.title;
    document.getElementById("mArtist").textContent = a.artist;
    document.getElementById("mDesc").textContent   = a.desc;
    document.getElementById("mDate").textContent   = a.date;
    document.getElementById("mMedium").textContent = a.medium;
    document.getElementById("mDim").textContent    = a.dim;
    document.getElementById("mLoc").textContent    = a.loc;
    document.getElementById("mStyle").textContent  = a.style;
    modal.classList.add("open");
    document.body.style.overflow = "hidden";
}

function closeModal() {
    modal.classList.remove("open");
    document.body.style.overflow = "";
}

/* ── FILTERS ── */
document.getElementById("filters").addEventListener("click", e => {
    const btn = e.target.closest(".filter-btn");
    if (!btn) return;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = btn.dataset.cat;
    render();
});

/* ── SEARCH ── */
searchBar.addEventListener("input", e => {
    query = e.target.value.trim();
    render();
});

/* ── MODAL CLOSE ── */
document.getElementById("modalClose").onclick = closeModal;
modal.addEventListener("click", e => { if (e.target === modal) closeModal(); });
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

/* ── HAMBURGER ── */
document.getElementById("hamburger").onclick = () => {
    document.getElementById("navLinks").classList.toggle("open");
};

// Close mobile nav on link click
document.querySelectorAll(".nav-links a").forEach(a => {
    a.addEventListener("click", () => {
        document.getElementById("navLinks").classList.remove("open");
    });
});

render();
</script>
